---
export:
  - name: Moxon_OE1EBG
    source: Moxon_OE1EBG.FCStd
    # Can specify bodies by Name (Body) or Label (Feed001, Cover001, etc) - more user-friendly
    bodies:
      - Feed001           # Actual Label: Feed001 (Name: Body)
      - body: Cover001          # Actual Label: Cover001 (Name: Body002)
        rotation: [0, 180, 0]
        position: [90, 90, 0]
      - body: "Angle Round"     # Actual Label: Angle Round (Name: Body003)
        position: [50, 0, 0]
      - body: "Angle Round"     # Actual Label: Angle Round (Name: Body003)
        position: [50, 50, 0]

    # Optional: output filename (default: prints/{name}.3mf)
    output: prints/Moxon_OE1EBG.3mf
    # Optional: template 3MF file with pre-configured printer settings
    template: .freecad_tools/template_print_settings.3mf
    # Keep generated STL files after creating 3MF (default: false)
    keep_stl: true
    # Directory to store STL files (only used if keep_stl is true)
    stl_output_dir: prints/stl
    techdraw_source: all
    techdraw:
      output_dir: docs
      format: pdf
      instructions: INSTRUCTIONS.md
    bom:
      source: assembly
      output: docs/bom.csv

macros:
  variant_array_assignment:
    array_label: VariantTestArray
    cleanup_before_assign: true
    # cleanup_untagged_copy_groups: true
    enable_link_copy_on_change: true

    spreadsheet_label: VariantData
    parameters:
      - name: PipeDiameter
        values: [10.1, 10.2]
        # start: 10.1
        # stop: 10.3
        # step: 0.1
      - name: HexIndent
        values: [0.3, 0.5, 0.7, 0.9]
      - name: HexLength
        values: [5]
