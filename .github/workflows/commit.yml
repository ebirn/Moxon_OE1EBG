---
name: CI

"on":
  push:
    branches:
      - main
      - "**"
  pull_request:

jobs:
  build-artifacts-dry-run:
    uses: ebirn/freecad_tools/.github/workflows/reusable-build-3mf-artifacts.yml@main
    with:
      config_path: .freecad_tools/config.yml
      project_root: .
      gui_session: item
      dry_run: true
      artifact_glob: prints/** docs/**
