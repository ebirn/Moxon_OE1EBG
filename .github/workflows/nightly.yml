---
name: Nightly Release

"on":
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    uses: ebirn/freecad_tools/.github/workflows/reusable-publish-nightly-release.yml@main
    with:
      config_path: .freecad_tools/export.yml
      project_root: ./
      gui_session: run
      dry_run: false
      nightly_tag: nightly
      bundle_name: Moxon_OE1EBG-nightly
      bundle_paths: >-
        README.md INSTRUCTIONS.md Moxon_OE1EBG.FCStd
      generated_paths: >-
        docs prints
